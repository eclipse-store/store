# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      #Build with java 17
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    - name: Align serializer version to matching branch snapshot
      uses: ./.github/actions/align-serializer-version
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Build with Maven
      run: mvn  -T 1C -P examples -B clean package --file pom.xml -U

    - name: Report JUnit results (dorny - surefire)
      if: always()
      uses: dorny/test-reporter@v2
      with:
        name: "GigaMap - CI Test result without slow"
        path: '**/target/**/surefire-reports/*.xml'
        reporter: java-junit
        fail-on-error: false

